<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa 1M de pesos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark:  #4a0080;
            --purple-main:  #7b2fe0;
            --purple-light: #b56aff;
            --purple-pale:  #f3e8ff;
            --gold:         #ffd700;
            --red:          #e85d5d;
            --green:        #22c55e;
            --text-dark:    #1e0033;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a0030 0%, #3b0075 60%, #6a1fa8 100%);
            min-height: 100vh;
            color: #333;
        }

        header {
            background: linear-gradient(90deg, var(--purple-dark), var(--purple-main), var(--purple-light));
            color: white;
            padding: 36px 20px 28px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(123,47,224,0.5);
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        header h1 {
            margin: 0;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            position: relative;
        }
        header p.subtitle {
            margin: 8px 0 0;
            font-size: 1rem;
            opacity: 0.85;
            position: relative;
        }

        .prize-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(90deg, #ffd700, #ffaa00, #ffd700);
            color: #1e0033;
            font-weight: 800;
            font-size: clamp(1rem, 3vw, 1.4rem);
            padding: 12px 24px;
            text-align: center;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 10px rgba(255,170,0,0.4);
        }
        .prize-banner span.icon { font-size: 1.5em; }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 28px;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(74,0,128,0.35);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--purple-dark);
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--purple-pale);
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 22px;
            background: linear-gradient(180deg, var(--purple-main), var(--purple-light));
            border-radius: 3px;
        }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 22px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
        }
        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .legend-dot.libre   { background: var(--purple-light); }
        .legend-dot.vendido { background: var(--red); }
        .legend-dot.pagado  { background: var(--gold); }
        .legend-dot.ganador { background: var(--green); }

        /* Numbers grid */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
        }

        .number {
            padding: 14px 8px;
            background: linear-gradient(135deg, var(--purple-main), var(--purple-light));
            color: white;
            border-radius: 10px;
            cursor: default;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 3px 8px rgba(123,47,224,0.25);
        }
        .number:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(123,47,224,0.35);
        }

        .number.vendido {
            background: linear-gradient(135deg, #e85d5d, #ff9090);
            box-shadow: 0 3px 8px rgba(232,93,93,0.3);
        }

        .number.pagado {
            background: linear-gradient(135deg, #d4a800, #ffd700);
            color: #1e0033;
            box-shadow: 0 3px 8px rgba(212,168,0,0.35);
            position: relative;
        }
        .number.pagado::after {
            content: '✓ Pagado';
            color: white;
            font-size: 0.65em;
            font-weight: 700;
            background-color: var(--purple-dark);
            border-radius: 4px;
            padding: 2px 5px;
            position: absolute;
            top: -8px;
            right: -5px;
        }

        .number.ganador {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            box-shadow: 0 0 20px rgba(34,197,94,0.6);
            animation: pulse 1.2s infinite alternate;
            position: relative;
        }
        .number.ganador::before {
            content: '🏆';
            display: block;
            font-size: 1.1em;
            margin-bottom: 2px;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 10px rgba(34,197,94,0.5); transform: scale(1); }
            100% { box-shadow: 0 0 28px rgba(34,197,94,0.9); transform: scale(1.06); }
        }

        .description {
            background-color: var(--purple-pale);
            padding: 20px;
            margin-top: 24px;
            border-radius: 10px;
            border-left: 5px solid var(--purple-main);
        }

        footer {
            margin: 10px 0 30px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.88rem;
        }
        footer strong { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>🎟️ Rifa 1 Millón de Pesos</h1>
    <p class="subtitle">¡Participa y gana el premio mayor!</p>
</header>

<div class="prize-banner">
    <span class="icon">💰</span>
    PREMIO: <strong>$1.000.000 COP</strong>
    <span class="icon">💰</span>
</div>

<div class="container">
    <div class="section-title">Números de la Rifa</div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot libre"></div> Disponible</div>
        <div class="legend-item"><div class="legend-dot vendido"></div> Vendido</div>
        <div class="legend-item"><div class="legend-dot pagado"></div> Pagado</div>
        <div class="legend-item"><div class="legend-dot ganador"></div> Ganador</div>
    </div>

    <div class="numbers-grid" id="numbersGrid"></div>
</div>

<footer>
    <p>Responsable: Sara Rodriguez </p>
</footer>

<script>
    const ganadorGid0 = '0'; // GID de la hoja que contiene los números y su estado
    const spreadsheetId = '2PACX-1vThTKuJVZAd0rESx4cAIsURTml6ngaRQfqM0DA8Mu47BzNKDisct9N-DEAN--qnzhpT7d6ilPq0Jyrl';
    const csvUrl = `https://docs.google.com/spreadsheets/d/e/${spreadsheetId}/pub?output=csv&gid=${ganadorGid0}`;


    const ganadorGid = '1829464852';
    const ganadorUrl = `https://docs.google.com/spreadsheets/d/e/${spreadsheetId}/pub?output=csv&gid=${ganadorGid}`;

    // Obtiene el número ganador desde la Hoja 3 (primera celda con contenido)
    async function obtenerNumeroGanador() {
        try {
            const response = await fetch(ganadorUrl);
            const data = await response.text();
            const rows = data.split('\n');
            for (const row of rows) {
                const valor = row.split(',')[0].trim();
                if (valor && !isNaN(parseInt(valor))) {
                    return valor.padStart(2, '0');
                }
            }
        } catch (error) {
            console.error('Error al obtener el número ganador:', error);
        }
        return null;
    }

    // Función para obtener los datos desde la hoja en formato CSV
    async function obtenerDatosDeLaHoja() {
        try {
            const [response, numeroGanador] = await Promise.all([
                fetch(csvUrl),
                obtenerNumeroGanador()
            ]);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const numeros = rows.map(row => {
                const [numero, vendido, comprador, pagado] = row.split(',');
                return {
                    numero: numero.padStart(2, '0'),
                    vendido: vendido.trim().toLowerCase() === 'si',
                    comprador: comprador ? comprador.trim() : '',
                    pagado: pagado.trim().toLowerCase() === 'si'
                };
            });
            actualizarNumerosEnLaPagina(numeros, numeroGanador);
        } catch (error) {
            console.error('Error al obtener datos de la hoja:', error);
        }
    }

    // Función para actualizar los números en la página
    function actualizarNumerosEnLaPagina(numeros, numeroGanador) {
        const numbersGrid = document.getElementById('numbersGrid');
        numbersGrid.innerHTML = '';

        for (let i = 0; i < 100; i++) {
            const numeroStr = i.toString().padStart(2, '0');
            const numeroData = numeros.find(n => n.numero === numeroStr) || { numero: numeroStr, vendido: false, pagado: false, comprador: '' };
            
            const numberElement = document.createElement('div');
            numberElement.classList.add('number');
            numberElement.textContent = numeroStr;

            if (numeroGanador && numeroStr === numeroGanador) {
                numberElement.classList.add('ganador');
                numberElement.textContent += ' - ¡Ganador!';
            } else if (numeroData.vendido) {
                numberElement.classList.add('vendido');
                numberElement.textContent += ` - Vendido (${numeroData.comprador})`;
            }

            if (numeroData.pagado) {
                numberElement.classList.add('pagado');
            }

            numbersGrid.appendChild(numberElement);
        }
    }

    // Llamar a la función para obtener los datos al cargar la página
    obtenerDatosDeLaHoja();
</script>

</body>
</html>
